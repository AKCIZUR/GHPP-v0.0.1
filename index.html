<!doctype html>
<html lang="cs">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liquid TV Grid</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

  <style>
    /* --- Reset & Body --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #000;
      font-family: "Inter", sans-serif;
      color: #fff;
    }

    video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
      pointer-events: none;
    }

    /* --- Center Play / Pause Button --- */
    .CenterPlayOverlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .CenterPlayBtn {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 2px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
      pointer-events: auto;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .CenterPlayBtn:hover {
      transform: scale(1.08);
      background: rgba(255, 255, 255, 0.10);
    }

    .CenterPlayBtn svg {
      width: 36px;
      height: 36px;
      fill: #fff;
    }

    /* --- Channel Info (Left Center) --- */
    .ChannelInfo {
      position: fixed;
      left: 30px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 9997;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border-radius: 16px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: opacity 0.6s ease, transform 0.6s ease;
      pointer-events: none;
    }

    .ChannelInfo img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: contain;
    }

    .ChannelInfo span {
      font-size: 20px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    /* --- Bottom Controls --- */
    .ControlsContainer {
      position: fixed;
      bottom: 30px;
      z-index: 9999;
      display: flex;
      gap: 20px;
      align-items: center;
      transition: opacity 0.6s ease, transform 0.6s ease;
    }

    .ControlsContainer.left {
      left: 30px;
    }

    .ControlsContainer.right {
      right: 30px;
    }

    .CircleControl {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.2s ease;
      color: #fff;
      pointer-events: auto;
    }

    .CircleControl:hover {
      background: rgba(255, 255, 255, 0.16);
      transform: scale(1.05);
    }

    .CircleControl svg {
      width: 22px;
      height: 22px;
      stroke: #fff;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* --- Volume Popup (horizontal slider in vertical container) --- */
    .VolumeWrapper {
      position: relative;
      pointer-events: auto;
    }

    .VolumeSliderPopup {
      position: absolute;
      bottom: 70px;
      left: 50%;
      transform: translateX(-50%) scale(0.8);
      width: 40px;
      height: 130px;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
    }

    .VolumeWrapper.open .VolumeSliderPopup {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) scale(1);
    }

    .VolumeSliderContainer {
      transform: rotate(-90deg);
      display: flex;
      align-items: center;
      justify-content: center;
      width: 120px;
      height: 34px;
    }

    .VolumeSliderContainer input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.5);
      border-radius: 999px;
      outline: none;
      cursor: pointer;
      margin: 0;
    }

    .VolumeSliderContainer input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.5);
    }

    .VolumeSliderContainer input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 50%;
      background: #fff;
    }

    /* --- Grid Overlay (Channel List) --- */
    .GridOverlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: none;
      justify-content: center;
      align-items: center;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .GridOverlay.active {
      display: flex;
      opacity: 1;
    }

    .GridContainer {
      width: 90%;
      max-width: 1100px;
      max-height: 80vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 18px 16px;
      padding: 20px 10px;
      justify-content: center;
    }

    .GridItem {
      width: 80px;
      height: 80px;
      margin: auto;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 2px solid transparent;
    }

    .GridItem img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: contain;
      pointer-events: none;
    }

    .GridItem.active {
      border-color: #fff;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.2);
      transform: scale(1.06);
    }

    .GridItem.hovered {
      transform: scale(1.12);
      background: rgba(255, 255, 255, 0.12);
    }

    /* --- UI Animation States (Idle / Active) --- */
    body.IdleUI .CenterPlayOverlay,
    body.IdleUI .ControlsContainer,
    body.IdleUI .ChannelInfo {
      opacity: 0 !important;
      transform: translateY(15px) scale(0.95);
      pointer-events: none !important;
    }

    body.IdleUI .CenterPlayOverlay {
      transform: scale(0.9);
    }

    body.IdleUI .ChannelInfo {
      transform: translateY(-50%) scale(0.95) !important;
    }

    /* --- Mobile adjustments --- */
    @media (max-width: 640px) {
      .ControlsContainer.left { left: 15px; }
      .ControlsContainer.right { right: 15px; }
      .CircleControl { width: 44px; height: 44px; }
      .CenterPlayBtn { width: 70px; height: 70px; }
      .ChannelInfo { left: 15px; padding: 8px 12px; gap: 10px; }
      .ChannelInfo img { width: 32px; height: 32px; }
      .ChannelInfo span { font-size: 15px; }
      .GridContainer { padding: 10px; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); }
      .GridItem { width: 70px; height: 70px; }
      .VolumeSliderPopup { width: 36px; height: 110px; }
      .VolumeSliderContainer { width: 100px; height: 30px; }
    }

    @media (max-width: 450px) {
      .GridContainer { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
      .GridItem { width: 60px; height: 60px; }
      .ControlsContainer { bottom: 15px; }
    }
  </style>
</head>

<body>

  <!-- Video Element (no autoplay) -->
  <video id="video" playsinline></video>

  <!-- Center Play / Pause Button -->
  <div class="CenterPlayOverlay" id="centerPlayOverlay">
    <div class="CenterPlayBtn" id="centerPlayBtn">
      <svg viewBox="0 0 24 24">
        <polygon points="5 3 19 12 5 21 5 3" />
      </svg>
    </div>
  </div>

  <!-- Channel Info (Left Center) -->
  <div class="ChannelInfo" id="channelInfo">
    <img id="channelLogo" src="" alt="" />
    <span id="channelName"></span>
  </div>

  <!-- Bottom Controls -->
  <div class="ControlsContainer left" id="leftControls">
    <!-- Grid / Menu Button -->
    <div class="CircleControl" id="gridBtn" title="Seznam kanálů">
      <svg viewBox="0 0 24 24">
        <rect x="3" y="3" width="7" height="7"></rect>
        <rect x="14" y="3" width="7" height="7"></rect>
        <rect x="14" y="14" width="7" height="7"></rect>
        <rect x="3" y="14" width="7" height="7"></rect>
      </svg>
    </div>
  </div>

  <div class="ControlsContainer right" id="rightControls">
    <!-- Mute / Volume -->
    <div class="VolumeWrapper" id="volumeWrapper">
      <div class="CircleControl" id="muteBtn" title="Hlasitost">
        <svg id="volumeIcon" viewBox="0 0 24 24">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
          <path d="M19 5C21 7 22 9.5 22 12C22 14.5 21 17 19 19"></path>
          <path d="M15.5 8C16.8 9.2 17.5 10.5 17.5 12C17.5 13.5 16.8 14.8 15.5 16"></path>
        </svg>
      </div>
      <div class="VolumeSliderPopup">
        <div class="VolumeSliderContainer">
          <input id="volumeSlider" type="range" min="0" max="100" value="100" />
        </div>
      </div>
    </div>

    <!-- Fullscreen -->
    <div class="CircleControl" id="fullscreenBtn" title="Celá obrazovka">
      <svg viewBox="0 0 24 24">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <line x1="21" y1="3" x2="14" y2="10"></line>
        <line x1="3" y1="21" x2="10" y2="14"></line>
      </svg>
    </div>
  </div>

  <!-- Grid Overlay (Channel List) -->
  <div class="GridOverlay" id="gridOverlay">
    <div class="GridContainer" id="gridContainer"></div>
  </div>

  <script>
    // --- Streams Data ---
    const streams = [
      { name: "ČT1", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/ct1.png", url: "http://88.212.15.47/live/test_ct1_25p/playlist.m3u8" },
      { name: "ČT2", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/ct2.png", url: "http://88.212.15.47/live/test_ct2_25p/playlist.m3u8" },
      { name: "ČT24", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/ct24.png", url: "http://88.212.15.47/live/ct24_avc_25p/playlist.m3u8" },
      { name: "ČT Sport", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/ctsport.png", url: "http://88.212.15.47/live/test_ct_sport_hevc_25p/playlist.m3u8" },
      { name: "TV Nova", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/nova.png", url: "http://88.212.15.47/live/nova_avc_25p/playlist.m3u8" },
      { name: "Nova Cinema", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/novacinema.png", url: "http://88.212.15.47/live/nova_cinema_avc_25p/playlist.m3u8" },
      { name: "Nova Fun", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/novafun.png", url: "http://88.212.15.47/live/nova_fun_avc_25p/playlist.m3u8" },
      { name: "Nova Action", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/novaaction.png", url: "http://88.212.15.47/live/nova_action_avc_25p/playlist.m3u8" },
      { name: "Nova Gold", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/novagold.png", url: "http://88.212.15.47/live/nova_gold_avc_25p/playlist.m3u8" },
      { name: "Nova Lady", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/novalady.png", url: "http://88.212.15.47/live/test_nova_lady_hevc_25p/playlist.m3u8" },
      { name: "Prima", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/prima.png", url: "http://88.212.15.47/live/prima_avc_25p/playlist.m3u8" },
      { name: "Prima COOL", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/primacool.png", url: "http://88.212.15.47/live/prima_cool_cz_hevc/index.m3u8" },
      { name: "Prima KRIMI", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/primakrimi.png", url: "http://88.212.15.47/live/test_prima_krimi_hevc/playlist.m3u8" },
      { name: "Prima LOVE", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/primalove.png", url: "http://88.212.15.47/live/test_prima_love_hevc/playlist.m3u8" },
      { name: "Prima ZOOM", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/primazoom.png", url: "http://88.212.15.47/live/test_prima_zoom_hevc/playlist.m3u8" },
      { name: "Prima Show", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/primashow.png", url: "http://88.212.15.47/live/prima_show_25p/playlist.m3u8" },
      { name: "CNN Prima News", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/cnnprimanews.png", url: "http://88.212.15.47/live/test_cnn_pirma_news/playlist.m3u8" },
      { name: "AMC", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/amc.png", url: "http://88.212.15.47/live/test_amc_25p/playlist.m3u8" },
      { name: "AXN", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/axn.png", url: "http://88.212.15.47/live/test_axn/playlist.m3u8" },
      { name: "Cinemax", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/cinemax.png", url: "http://88.212.15.47/live/test_cinemax_hd_hevc/playlist.m3u8" },
      { name: "Cinemax 2", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/cinemax2.png", url: "http://88.212.15.47/live/test_cinemax2_hd_hevc/playlist.m3u8" },
      { name: "Film+", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/filmplus.png", url: "http://88.212.15.47/live/test_film_plus_25p/playlist.m3u8" },
      { name: "Filmbox", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/filmbox.png", url: "http://88.212.15.47/live/test_filmbox/playlist.m3u8" },
      { name: "HBO", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/hbo.png", url: "http://88.212.15.47/live/test_hbo_hd_hevc/playlist.m3u8" },
      { name: "HBO 2", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/hbo2.png", url: "http://88.212.15.47/live/test_hbo2_hd_hevc/playlist.m3u8" },
      { name: "HBO 3", logo: "https://raw.githubusercontent.com/MarhyCZ/picons/refs/heads/master/640/hbo3.png", url: "http://88.212.15.47/live/test_hbo3_hd_hevc/playlist.m3u8" },
    ];

    // Preload logos
    streams.forEach(s => { const i = new Image(); i.src = s.logo; });

    // --- DOM Refs ---
    const video = document.getElementById("video");
    const gridContainer = document.getElementById("gridContainer");
    const gridOverlay = document.getElementById("gridOverlay");
    const gridBtn = document.getElementById("gridBtn");
    const centerPlayBtn = document.getElementById("centerPlayBtn");
    const muteBtn = document.getElementById("muteBtn");
    const volumeIcon = document.getElementById("volumeIcon");
    const volumeSlider = document.getElementById("volumeSlider");
    const volumeWrapper = document.getElementById("volumeWrapper");
    const fullscreenBtn = document.getElementById("fullscreenBtn");
    const channelLogo = document.getElementById("channelLogo");
    const channelName = document.getElementById("channelName");

    let activeIndex = 0;
    let hoverIndex = 0;
    let hls = null;
    let idleTimer = null;
    let volumeTimer = null;
    let isPlaying = false;

    // --- Init Grid ---
    streams.forEach((stream, index) => {
      const item = document.createElement("div");
      item.className = "GridItem" + (index === 0 ? " active" : "");
      item.innerHTML = `<img src="${stream.logo}" alt="${stream.name}" draggable="false" />`;
      item.dataset.index = index;
      item.addEventListener("mouseenter", () => {
        hoverIndex = index;
        document.querySelectorAll(".GridItem").forEach(el => el.classList.remove("hovered"));
        item.classList.add("hovered");
      });
      item.addEventListener("mouseleave", () => {
        item.classList.remove("hovered");
      });
      item.addEventListener("click", () => {
        selectChannel(index);
        closeGrid();
      });
      gridContainer.appendChild(item);
    });

    const gridItems = document.querySelectorAll(".GridItem");

    // --- Core Functions ---
    function loadStream(url) {
      if (hls) { hls.destroy(); hls = null; }

      if (window.Hls && Hls.isSupported()) {
        hls = new Hls({ enableWorker: true, lowLatencyMode: true });
        hls.loadSource(url);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => {
          video.play().catch(() => {});
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.play().catch(() => {});
      }
    }

    function selectChannel(index) {
      if (index < 0) index = streams.length - 1;
      if (index >= streams.length) index = 0;

      activeIndex = index;
      hoverIndex = index;
      loadStream(streams[index].url);

      // Update channel info
      channelLogo.src = streams[index].logo;
      channelName.textContent = streams[index].name;

      gridItems.forEach((el, i) => {
        el.classList.toggle("active", i === index);
      });

      // Ensure video plays
      if (video.paused) {
        video.play().catch(() => {});
        isPlaying = true;
      } else {
        isPlaying = true;
      }
      updatePlayIcon();
      resetIdleTimer();
    }

    function updatePlayIcon() {
      const svg = centerPlayBtn.querySelector("svg");
      if (isPlaying) {
        svg.innerHTML = `<rect x="6" y="4" width="4" height="16" /><rect x="14" y="4" width="4" height="16" />`;
      } else {
        svg.innerHTML = `<polygon points="5 3 19 12 5 21 5 3" />`;
      }
    }

    function togglePlay() {
      if (video.paused) {
        video.play().catch(() => {});
        isPlaying = true;
      } else {
        video.pause();
        isPlaying = false;
      }
      updatePlayIcon();
      resetIdleTimer();
    }

    function openGrid() {
      // Update hover indicator to active channel
      gridItems.forEach(el => {
        el.classList.remove("hovered");
        if (parseInt(el.dataset.index) === activeIndex) {
          el.classList.add("hovered");
        }
      });
      hoverIndex = activeIndex;
      gridOverlay.classList.add("active");
      resetIdleTimer();
    }

    function closeGrid() {
      gridOverlay.classList.remove("active");
      resetIdleTimer();
    }

    function toggleGrid() {
      if (gridOverlay.classList.contains("active")) {
        closeGrid();
      } else {
        openGrid();
      }
    }

    // --- UI State ---
    function setActiveUI() {
      document.body.classList.remove("IdleUI");
    }

    function setIdleUI() {
      document.body.classList.add("IdleUI");
      volumeWrapper.classList.remove("open");
    }

    function resetIdleTimer() {
      setActiveUI();
      clearTimeout(idleTimer);
      idleTimer = setTimeout(setIdleUI, 3000);
    }

    // --- Volume ---
    video.volume = 1;
    volumeSlider.value = 100;

    function updateVolumeIcon() {
      if (video.muted || video.volume === 0) {
        volumeIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line>`;
      } else {
        volumeIcon.innerHTML = `<polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19 5C21 7 22 9.5 22 12C22 14.5 21 17 19 19"></path><path d="M15.5 8C16.8 9.2 17.5 10.5 17.5 12C17.5 13.5 16.8 14.8 15.5 16"></path>`;
      }
    }

    volumeSlider.addEventListener("input", () => {
      video.volume = volumeSlider.value / 100;
      video.muted = volumeSlider.value == 0;
      updateVolumeIcon();
      resetIdleTimer();
      clearTimeout(volumeTimer);
      volumeWrapper.classList.add("open");
      volumeTimer = setTimeout(() => {
        if (!volumeWrapper.matches(":hover") && !muteBtn.matches(":hover")) {
          volumeWrapper.classList.remove("open");
        }
      }, 2000);
    });

    muteBtn.addEventListener("click", () => {
      if (video.muted || video.volume === 0) {
        video.muted = false;
        if (video.volume <= 0) video.volume = 1;
        volumeSlider.value = Math.round(video.volume * 100);
      } else {
        video.muted = true;
        volumeSlider.value = 0;
      }
      updateVolumeIcon();
      resetIdleTimer();
      volumeWrapper.classList.add("open");
      clearTimeout(volumeTimer);
      volumeTimer = setTimeout(() => {
        if (!volumeWrapper.matches(":hover") && !muteBtn.matches(":hover")) {
          volumeWrapper.classList.remove("open");
        }
      }, 2000);
    });

    muteBtn.addEventListener("mouseenter", () => {
      volumeWrapper.classList.add("open");
      clearTimeout(volumeTimer);
      resetIdleTimer();
    });

    volumeWrapper.addEventListener("mouseleave", () => {
      volumeTimer = setTimeout(() => {
        if (!volumeWrapper.matches(":hover") && !muteBtn.matches(":hover")) {
          volumeWrapper.classList.remove("open");
        }
      }, 2000);
    });

    volumeWrapper.addEventListener("mouseenter", () => {
      clearTimeout(volumeTimer);
    });

    video.addEventListener("volumechange", () => {
      volumeSlider.value = Math.round((video.volume || 0) * 100);
      updateVolumeIcon();
    });

    // --- Fullscreen ---
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    fullscreenBtn.addEventListener("click", toggleFullscreen);

    // Double-click anywhere (except controls) to toggle fullscreen
    document.addEventListener("dblclick", (e) => {
      if (!e.target.closest(".ControlsContainer") && !e.target.closest(".GridOverlay") && !e.target.closest(".CenterPlayOverlay")) {
        toggleFullscreen();
      }
    });

    // --- Events ---
    centerPlayBtn.addEventListener("click", togglePlay);
    gridBtn.addEventListener("click", toggleGrid);

    // Click outside grid to close
    gridOverlay.addEventListener("click", (e) => {
      if (e.target === gridOverlay) closeGrid();
    });

    // Mouse movement -> Active UI
    window.addEventListener("mousemove", resetIdleTimer, { passive: true });
    window.addEventListener("mousedown", resetIdleTimer, { passive: true });
    window.addEventListener("touchstart", resetIdleTimer, { passive: true });

    // Keyboard shortcuts
    window.addEventListener("keydown", (e) => {
      resetIdleTimer();

      const isGridOpen = gridOverlay.classList.contains("active");

      // Enter / Space
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        if (isGridOpen) {
          // Select hovered channel and close grid
          const targetItem = document.querySelector(`.GridItem[data-index="${hoverIndex}"]`);
          if (targetItem) {
            selectChannel(hoverIndex);
            closeGrid();
          } else {
            closeGrid();
          }
        } else {
          togglePlay();
        }
      }

      // Escape closes grid
      if (e.key === "Escape" && isGridOpen) {
        closeGrid();
      }

      // Arrow keys
      if (e.key === "ArrowRight") {
        if (isGridOpen) {
          // Navigate grid
          const next = (hoverIndex + 1) % streams.length;
          hoverIndex = next;
          gridItems.forEach(el => {
            el.classList.remove("hovered");
            if (parseInt(el.dataset.index) === hoverIndex) {
              el.classList.add("hovered");
            }
          });
        } else {
          selectChannel((activeIndex + 1) % streams.length);
        }
      }

      if (e.key === "ArrowLeft") {
        if (isGridOpen) {
          const prev = (hoverIndex - 1 + streams.length) % streams.length;
          hoverIndex = prev;
          gridItems.forEach(el => {
            el.classList.remove("hovered");
            if (parseInt(el.dataset.index) === hoverIndex) {
              el.classList.add("hovered");
            }
          });
        } else {
          selectChannel((activeIndex - 1 + streams.length) % streams.length);
        }
      }

      if (e.key === "f") toggleFullscreen();

      // Volume
      if (e.key === "ArrowUp") {
        video.volume = Math.min(1, video.volume + 0.05);
        volumeSlider.value = Math.round(video.volume * 100);
        video.muted = false;
        updateVolumeIcon();
        volumeWrapper.classList.add("open");
        clearTimeout(volumeTimer);
        volumeTimer = setTimeout(() => {
          if (!volumeWrapper.matches(":hover") && !muteBtn.matches(":hover")) {
            volumeWrapper.classList.remove("open");
          }
        }, 2000);
      }
      if (e.key === "ArrowDown") {
        video.volume = Math.max(0, video.volume - 0.05);
        volumeSlider.value = Math.round(video.volume * 100);
        if (video.volume === 0) video.muted = true;
        updateVolumeIcon();
        volumeWrapper.classList.add("open");
        clearTimeout(volumeTimer);
        volumeTimer = setTimeout(() => {
          if (!volumeWrapper.matches(":hover") && !muteBtn.matches(":hover")) {
            volumeWrapper.classList.remove("open");
          }
        }, 2000);
      }
    });

    // Mouse wheel volume
    window.addEventListener("wheel", (e) => {
      resetIdleTimer();
      if (Math.abs(e.deltaY) > 0) {
        video.muted = false;
        const step = e.deltaY < 0 ? 0.03 : -0.03;
        video.volume = Math.max(0, Math.min(1, video.volume + step));
        volumeSlider.value = Math.round(video.volume * 100);
        if (video.volume === 0) video.muted = true;
        updateVolumeIcon();
        volumeWrapper.classList.add("open");
        clearTimeout(volumeTimer);
        volumeTimer = setTimeout(() => {
          if (!volumeWrapper.matches(":hover") && !muteBtn.matches(":hover")) {
            volumeWrapper.classList.remove("open");
          }
        }, 2000);
      }
    }, { passive: true });

    // --- Init ---
    updateVolumeIcon();
    selectChannel(0);
    resetIdleTimer();
  </script>
</body>

</html>
